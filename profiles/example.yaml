description: An example profile.
attach: example
sessions:
  - name: example
    dir: /tmp/
    windows:
      - *editor
      - name: staging
        cmd: ssh foo@staging-server-1
        panes:
          - split: horizontal
            cmd: ssh foo@staging-server-2
      - name: production
        cmd: ssh bar@production-server-1
        panes:
          - split: horizontal
            cmd: ssh bar@production-server-2
